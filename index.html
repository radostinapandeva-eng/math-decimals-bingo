<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Бинго – Десетични дроби (5. клас)</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --accent:#2667ff; --accent2:#00a38a;
      --text:#1f2937; --muted:#6b7280; --grid:#e5e7eb; --hit:#d1fae5;
    }
    *{box-sizing:border-box}
    body{margin:0;padding:24px;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{max-width:920px;margin:0 auto 16px auto}
    h1{margin:0 0 6px 0;font-size:clamp(22px,2.5vw,30px)}
    .lead{margin:6px 0 0 0;color:var(--muted)}
    .app{max-width:920px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:16px}
    @media (max-width:880px){.app{grid-template-columns:1fr}}
    .panel{background:var(--card);border:1px solid var(--grid);border-radius:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    button{border:0;background:var(--accent);color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    button.secondary{background:#e5e7eb;color:#111827}
    button.success{background:var(--accent2)}
    .task{margin-top:8px;padding:12px;border:1px dashed var(--grid);border-radius:10px;background:#fafafa}
    .task .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.04em}
    .task .value{font-size:22px;font-weight:700;margin-top:4px}
    .board{width:100%;aspect-ratio:1/1;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .cell{
      border:1px solid var(--grid);border-radius:10px;background:#fff;
      display:flex;align-items:center;justify-content:center;font-size:20px;user-select:none;cursor:pointer;
      transition:transform .05s ease, background .2s ease, box-shadow .2s ease; padding:6px
    }
    .cell:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .cell.marked{background:var(--hit);border-color:#34d399}
    .list{max-height:260px;overflow:auto;border:1px solid var(--grid);border-radius:10px;padding:8px;background:#fff}
    .list-item{padding:8px 10px;border-bottom:1px solid #f1f5f9}
    .list-item:last-child{border-bottom:0}
    .win{margin-top:10px;padding:10px;background:#ecfeff;border:1px solid #a5f3fc;border-radius:10px;display:none}
    .win.show{display:block}
    .small{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <header>
    <h1>БИНГО – Десетични дроби (5. клас)</h1>
    <p class="lead">Маркирай на картата резултата от текущата задача. 5 поред (ред, колона или диагонал) = БИНГО!</p>
  </header>

  <div class="app">
    <section class="panel">
      <div class="controls">
        <button id="btn-new" class="secondary">Нова карта</button>
        <button id="btn-next" class="success">Нова задача</button>
        <button id="btn-show" class="secondary">Покажи отговора</button>
        <button id="btn-reset" class="secondary">Изчисти маркировките</button>
      </div>

      <div class="task">
        <div class="label">Текуща задача</div>
        <div id="taskText" class="value">—</div>
        <div id="answerText" class="small" style="display:none;">Отговор: <b id="answerValue">—</b></div>
      </div>

      <div id="board" class="board" aria-label="Бинго картон 5x5"></div>
      <div id="win" class="win">🎉 Имаш БИНГО! Чудесна работа!</div>
    </section>

    <aside class="panel">
      <h3 style="margin-top:0">История на задачите</h3>
      <div id="history" class="list" aria-label="История на извиканите задачи"></div>
    </aside>
  </div>

  <script>
    // Задачи за 5. клас
    const tasks = [
      // Събиране
      {problem:'0.3 + 0.5', answer:0.8},
      {problem:'1.2 + 0.8', answer:2.0},
      {problem:'2.5 + 1.5', answer:4.0},
      {problem:'3.4 + 2.1', answer:5.5},
      {problem:'4.7 + 0.6', answer:5.3},
      // Изваждане
      {problem:'2.0 - 0.7', answer:1.3},
      {problem:'5.5 - 2.2', answer:3.3},
      {problem:'4.0 - 1.5', answer:2.5},
      {problem:'3.6 - 0.9', answer:2.7},
      {problem:'6.3 - 2.8', answer:3.5},
      // Умножение
      {problem:'1.5 × 2', answer:3.0},
      {problem:'0.6 × 5', answer:3.0},
      {problem:'0.8 × 4', answer:3.2},
      {problem:'2.5 × 2', answer:5.0},
      {problem:'1.2 × 3', answer:3.6},
      // Деление
      {problem:'3.6 ÷ 2', answer:1.8},
      {problem:'4.5 ÷ 5', answer:0.9},
      {problem:'2.4 ÷ 3', answer:0.8},
      {problem:'3.0 ÷ 2', answer:1.5},
      {problem:'5.0 ÷ 2', answer:2.5},
      // Сравнение
      {problem:'Кое е по-голямо: 0.7 или 0.65?', answer:0.7},
      {problem:'Кое е по-голямо: 1.2 или 1.02?', answer:1.2},
